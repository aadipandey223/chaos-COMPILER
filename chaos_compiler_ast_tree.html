
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-mono, monospace); }
  #root { padding: 16px 0; }
  #controls { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  #controls button {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    border: 0.5px solid var(--color-border-secondary); background: transparent;
    color: var(--color-text-primary); cursor: pointer;
  }
  #controls button:hover { background: var(--color-background-secondary); }
  #controls button.active { background: #d4522a; color: #fff; border-color: #d4522a; }
  #legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }

  #tree-wrap { overflow: auto; position: relative; }
  svg#ast { display: block; }

  .edge { stroke: var(--color-border-secondary); stroke-width: 1; fill: none; }
  .edge.mutated { stroke: #d4522a; stroke-width: 1.5; stroke-dasharray: 4 3; }

  .ast-node { cursor: pointer; }
  .ast-node rect { stroke-width: 0.5; rx: 8; transition: filter .15s; }
  .ast-node:hover rect { filter: brightness(1.1); }
  .ast-node text { font-family: var(--font-mono, 'JetBrains Mono', monospace); }

  .node-label { font-size: 11px; font-weight: 600; }
  .node-sub { font-size: 10px; opacity: 0.75; }
  .node-meta { font-size: 9px; opacity: 0.55; }

  #detail-panel {
    margin-top: 16px;
    border-radius: 10px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    padding: 14px 16px;
    font-size: 13px;
    min-height: 90px;
    transition: all .2s;
  }
  #detail-panel .dp-title { font-weight: 600; font-size: 14px; color: var(--color-text-primary); margin-bottom: 8px; }
  #detail-panel .dp-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; }
  #detail-panel .dp-key { color: var(--color-text-secondary); font-size: 12px; }
  #detail-panel .dp-val { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); }
  #detail-panel .dp-val.mut { color: #d4522a; font-weight: 600; }
  #detail-panel .dp-hint { margin-top: 8px; font-size: 11px; color: var(--color-text-secondary); line-height: 1.5; }
  .badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
    font-family: var(--font-mono); margin-left: 6px; vertical-align: middle;
  }
  .badge.mut { background: rgba(212,82,42,.15); color: #d4522a; border: 0.5px solid rgba(212,82,42,.3); }
  .badge.safe { background: rgba(30,150,90,.12); color: #1e9660; border: 0.5px solid rgba(30,150,90,.25); }
</style>

<div id="root">
  <div id="controls">
    <button id="btn-all" class="active" onclick="setFilter('all')">All nodes</button>
    <button id="btn-mut" onclick="setFilter('mutated')">Mutated only</button>
    <button id="btn-collapse" onclick="toggleCollapse()">Collapse subtrees</button>
    <div style="flex:1"></div>
    <div id="legend">
      <div class="leg"><div class="leg-dot" style="background:#4b6b9e"></div> Program</div>
      <div class="leg"><div class="leg-dot" style="background:#3a7a5e"></div> Statement</div>
      <div class="leg"><div class="leg-dot" style="background:#7a5e9a"></div> Expression</div>
      <div class="leg"><div class="leg-dot" style="background:#8a6a3a"></div> Literal</div>
      <div class="leg"><div class="leg-dot" style="background:#d4522a"></div> Mutated</div>
    </div>
  </div>

  <div id="tree-wrap">
    <svg id="ast" width="900" height="640"></svg>
  </div>

  <div id="detail-panel">
    <div class="dp-title" style="color:var(--color-text-secondary); font-weight:400; font-size:13px">
      Click any node to inspect it
    </div>
  </div>
</div>

<script>
const NODES = [
  { id:'prog',   label:'Program',             sub:'',              meta:'root',          type:'program',    line:null, mutated:false,  parent:null,         info:'Root of the AST. Contains all top-level declarations.', x:440, y:20 },
  { id:'fn1',    label:'FunctionDecl',         sub:'add(a, b)',      meta:'L1',            type:'stmt',       line:1,    mutated:false,  parent:'prog',       info:'Function declaration for add(). Takes two int parameters a and b.', x:200, y:100 },
  { id:'fn2',    label:'FunctionDecl',         sub:'main()',         meta:'L5',            type:'stmt',       line:5,    mutated:false,  parent:'prog',       info:'Entry point function main(). Returns int.', x:680, y:100 },
  { id:'blk1',   label:'BlockStatement',       sub:'3 stmts',        meta:'L1–L4',         type:'stmt',       line:1,    mutated:false,  parent:'fn1',        info:'Body of add(). Contains variable decls and a return statement.', x:80,  y:200 },
  { id:'vd1',    label:'VarDecl',              sub:'int result',     meta:'L2',            type:'stmt',       line:2,    mutated:false,  parent:'fn1',        info:'Declares local variable: int result', x:260, y:200 },
  { id:'vd2',    label:'VarDecl',              sub:'int tmp = 0',    meta:'L3',            type:'stmt',       line:3,    mutated:false,  parent:'fn1',        info:'Declares and initializes: int tmp = 0', x:380, y:200 },
  { id:'blk2',   label:'BlockStatement',       sub:'2 stmts',        meta:'L5–L11',        type:'stmt',       line:5,    mutated:false,  parent:'fn2',        info:'Body of main(). Contains if-statement and return.', x:650, y:200 },
  { id:'if1',    label:'IfStatement',          sub:'result != 0',    meta:'L2',            type:'stmt',       line:2,    mutated:false,  parent:'blk1',       info:'if (result != 0) — checks whether result is non-zero.', x:80,  y:300 },
  { id:'ret1',   label:'ReturnStatement',      sub:'return a + b',   meta:'L4',            type:'stmt',       line:4,    mutated:false,  parent:'blk1',       info:'Returns the sum of a and b.', x:230, y:300 },
  { id:'vd3',    label:'VarDecl',              sub:'int x = 10',     meta:'L7',            type:'stmt',       line:7,    mutated:false,  parent:'blk2',       info:'Declares: int x = 10', x:440, y:300 },
  { id:'if2',    label:'IfStatement',          sub:'x > 5',          meta:'L8',            type:'stmt',       line:8,    mutated:true,   parent:'blk2',       info:'MUTATED: Condition was x > 5, changed to x > 6 (OFF_BY_ONE mutation). Impact score: 8/10.', mutation:'OFF_BY_ONE', before:'x > 5', after:'x > 6', x:620, y:300 },
  { id:'ret2',   label:'ReturnStatement',      sub:'return 0',       meta:'L11',           type:'stmt',       line:11,   mutated:false,  parent:'blk2',       info:'Returns 0 from main() on normal exit.', x:820, y:300 },
  { id:'cond1',  label:'UnaryExpr',            sub:'! (result)',      meta:'L2',            type:'expr',       line:2,    mutated:false,  parent:'if1',        info:'Unary NOT applied to result. Part of the condition check.', x:40,  y:400 },
  { id:'blk3',   label:'BlockStatement',       sub:'1 stmt',         meta:'L2',            type:'stmt',       line:2,    mutated:false,  parent:'if1',        info:'Then-branch of first if statement.', x:140, y:400 },
  { id:'binex1', label:'BinaryExpr',           sub:'a + b',          meta:'L4',            type:'expr',       line:4,    mutated:true,   parent:'ret1',       info:'MUTATED: Operator changed from + to - (OPERATOR_MUTATION). Impact score: 10/10.', mutation:'OPERATOR_MUTATION', before:'a + b', after:'a - b', x:260, y:400 },
  { id:'lit1',   label:'NumericLiteral',       sub:'10',             meta:'L7',            type:'literal',    line:7,    mutated:true,   parent:'vd3',        info:'MUTATED: Literal value changed from 10 to 11 (LITERAL_SHIFT). Impact score: 5/10.', mutation:'LITERAL_SHIFT', before:'10', after:'11', x:440, y:400 },
  { id:'cond2',  label:'BinaryExpr',           sub:'x > 6',          meta:'L8',            type:'expr',       line:8,    mutated:true,   parent:'if2',        info:'MUTATED condition expression. Was x > 5, now x > 6. Child of the mutated IfStatement.', mutation:'OFF_BY_ONE', before:'x > 5', after:'x > 6', x:560, y:400 },
  { id:'blk4',   label:'BlockStatement',       sub:'2 stmts',        meta:'L8',            type:'stmt',       line:8,    mutated:false,  parent:'if2',        info:'Then-branch of main() if statement.', x:700, y:400 },
  { id:'retif',  label:'IfStatement',          sub:'x == 0',         meta:'L8',            type:'stmt',       line:8,    mutated:false,  parent:'blk4',       info:'Nested if: checks x == 0 inside the then-branch.', x:680, y:490 },
  { id:'id_a',   label:'Identifier',           sub:'a',              meta:'L4',            type:'literal',    line:4,    mutated:false,  parent:'binex1',     info:'Reference to parameter a in add().', x:220, y:490 },
  { id:'id_b',   label:'Identifier',           sub:'b',              meta:'L4',            type:'literal',    line:4,    mutated:false,  parent:'binex1',     info:'Reference to parameter b in add().', x:310, y:490 },
  { id:'id_x',   label:'Identifier',           sub:'x',              meta:'L8',            type:'literal',    line:8,    mutated:false,  parent:'cond2',      info:'Reference to variable x in condition.', x:510, y:490 },
  { id:'lit6',   label:'NumericLiteral',       sub:'6',              meta:'L8',            type:'literal',    line:8,    mutated:true,   parent:'cond2',      info:'MUTATED: Was 5, changed to 6 by OFF_BY_ONE mutation.', mutation:'OFF_BY_ONE', before:'5', after:'6', x:600, y:490 },
  { id:'callx',  label:'CallExpression',       sub:'add(x, y)',       meta:'L11',           type:'expr',       line:11,   mutated:false,  parent:'ret2',       info:'Function call: add(x, y) — calls the add function defined above.', x:820, y:400 },
  { id:'cx_id',  label:'Identifier',           sub:'x',              meta:'L11',           type:'literal',    line:11,   mutated:false,  parent:'callx',      info:'Argument x passed to add().', x:780, y:490 },
  { id:'cy_id',  label:'Identifier',           sub:'y',              meta:'L11',           type:'literal',    line:11,   mutated:false,  parent:'callx',      info:'Argument y passed to add().', x:860, y:490 },
];

const BY_ID = {};
NODES.forEach(n => BY_ID[n.id] = n);

const TYPE_COLOR = {
  program: { fill:'#1e2d4a', stroke:'#4b6b9e', text:'#a8c0e8' },
  stmt:    { fill:'#1a2e26', stroke:'#3a7a5e', text:'#8acfb0' },
  expr:    { fill:'#261d3a', stroke:'#7a5e9a', text:'#c0a8e8' },
  literal: { fill:'#2e2214', stroke:'#8a6a3a', text:'#d4b07a' },
};
const MUT_COLOR = { fill:'#3a1508', stroke:'#d4522a', text:'#f0845a' };

let filter = 'all';
let collapsed = false;
let collapsedIds = new Set();

function nodeColor(n) {
  return n.mutated ? MUT_COLOR : TYPE_COLOR[n.type];
}

function visibleNodes() {
  if (filter === 'mutated') {
    const mutIds = new Set(NODES.filter(n => n.mutated).map(n => n.id));
    const ancestors = new Set();
    function addAnc(id) {
      const n = BY_ID[id]; if (!n || !n.parent) return;
      ancestors.add(n.parent); addAnc(n.parent);
    }
    mutIds.forEach(id => addAnc(id));
    return NODES.filter(n => mutIds.has(n.id) || ancestors.has(n.id));
  }
  if (collapsed) {
    const vis = new Set();
    NODES.forEach(n => {
      if (!n.parent) vis.add(n.id);
      else if (!collapsedIds.has(n.parent)) vis.add(n.id);
    });
    return NODES.filter(n => vis.has(n.id));
  }
  return NODES;
}

function getEdges(vnodes) {
  const vids = new Set(vnodes.map(n => n.id));
  const edges = [];
  vnodes.forEach(n => {
    if (n.parent && vids.has(n.parent)) {
      const p = BY_ID[n.parent];
      edges.push({ x1: p.x+58, y1: p.y+32, x2: n.x+58, y2: n.y, mutated: n.mutated });
    }
  });
  return edges;
}

function render() {
  const svg = document.getElementById('ast');
  const vn = visibleNodes();
  const edges = getEdges(vn);

  // compute bounds
  let maxX = 900, maxY = 600;
  vn.forEach(n => {
    if (n.x + 120 > maxX) maxX = n.x + 120;
    if (n.y + 60 > maxY) maxY = n.y + 60;
  });
  svg.setAttribute('width', Math.max(900, maxX + 20));
  svg.setAttribute('height', Math.max(400, maxY + 40));
  svg.setAttribute('viewBox', `0 0 ${Math.max(900, maxX + 20)} ${Math.max(400, maxY + 40)}`);

  let html = '';

  // edges first
  edges.forEach(e => {
    html += `<path class="edge${e.mutated?' mutated':''}" d="M${e.x1},${e.y1} C${e.x1},${(e.y1+e.y2)/2} ${e.x2},${(e.y1+e.y2)/2} ${e.x2},${e.y2}"/>`;
  });

  // nodes
  vn.forEach(n => {
    const c = nodeColor(n);
    const W = 116, H = 50;
    const cx = n.x + W/2;
    html += `<g class="ast-node" data-id="${n.id}" onclick="selectNode('${n.id}')">
      <rect x="${n.x}" y="${n.y}" width="${W}" height="${H}" rx="8" fill="${c.fill}" stroke="${c.stroke}" stroke-width="${n.mutated?1.5:0.5}"/>
      ${n.mutated ? `<rect x="${n.x+W-18}" y="${n.y-6}" width="20" height="12" rx="3" fill="#d4522a" stroke="none"/>
        <text x="${n.x+W-8}" y="${n.y+2}" text-anchor="middle" font-size="7" font-family="var(--font-mono)" fill="#fff" font-weight="700">MUT</text>` : ''}
      <text class="node-label" x="${cx}" y="${n.y+17}" text-anchor="middle" fill="${c.text}">${n.label}</text>
      <text class="node-sub" x="${cx}" y="${n.y+30}" text-anchor="middle" fill="${c.text}">${n.sub || ''}</text>
      <text class="node-meta" x="${cx}" y="${n.y+43}" text-anchor="middle" fill="${c.text}">${n.meta}</text>
    </g>`;
  });

  svg.innerHTML = html;
}

function selectNode(id) {
  const n = BY_ID[id];
  if (!n) return;
  const panel = document.getElementById('detail-panel');
  const c = nodeColor(n);

  let rows = `
    <div class="dp-key">Node type</div><div class="dp-val">${n.label}</div>
    <div class="dp-key">Category</div><div class="dp-val">${n.type}</div>
    ${n.line ? `<div class="dp-key">Source line</div><div class="dp-val">L${n.line}</div>` : ''}
    ${n.sub ? `<div class="dp-key">Value / sig</div><div class="dp-val">${n.sub}</div>` : ''}
  `;

  let mutBadge = '';
  if (n.mutated) {
    mutBadge = `<span class="badge mut">MUTATED</span>`;
    rows += `
      <div class="dp-key">Mutation</div><div class="dp-val mut">${n.mutation}</div>
      <div class="dp-key">Before</div><div class="dp-val"><code>${n.before}</code></div>
      <div class="dp-key">After</div><div class="dp-val mut"><code>${n.after}</code></div>
    `;
  } else {
    mutBadge = `<span class="badge safe">CLEAN</span>`;
  }

  panel.innerHTML = `
    <div class="dp-title" style="color:${c.stroke}">${n.label} ${mutBadge}</div>
    <div class="dp-grid">${rows}</div>
    <div class="dp-hint">${n.info}</div>
  `;
}

function setFilter(f) {
  filter = f;
  document.getElementById('btn-all').classList.toggle('active', f === 'all');
  document.getElementById('btn-mut').classList.toggle('active', f === 'mutated');
  render();
}

function toggleCollapse() {
  collapsed = !collapsed;
  const btn = document.getElementById('btn-collapse');
  btn.classList.toggle('active', collapsed);
  btn.textContent = collapsed ? 'Expand all' : 'Collapse subtrees';
  if (collapsed) {
    collapsedIds = new Set(['blk1','blk2','blk3','blk4','if1']);
  } else {
    collapsedIds.clear();
  }
  render();
}

render();
</script>
