name: Translation Validation

on:
  push:
    paths:
      - 'src/lingo/**'
      - 'src/i18n/**'
      - 'src/compiler/mcp.js'
  pull_request:
    paths:
      - 'src/lingo/**'
      - 'src/i18n/**'

jobs:
  validate-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Validate Glossary Structure
        run: |
          echo "🔍 Validating compiler glossary..."
          node -e "
            const glossary = require('./src/i18n/compiler-glossary.json');
            const terms = Object.keys(glossary.terms);
            console.log('✅ Glossary contains', terms.length, 'terms');
            
            // Verify all terms have required translations
            const requiredLocales = ['es', 'zh', 'hi'];
            let errors = [];
            
            terms.forEach(term => {
              requiredLocales.forEach(locale => {
                const translation = glossary.terms[term].translations[locale];
                if (!translation || !translation.approved) {
                  errors.push(\`Missing or unapproved translation: \${term} -> \${locale}\`);
                }
              });
            });
            
            if (errors.length > 0) {
              console.error('❌ Glossary validation failed:');
              errors.forEach(e => console.error('  -', e));
              process.exit(1);
            }
            
            console.log('✅ All terms have approved translations');
          "
          
      - name: Check Terminology Consistency
        run: |
          echo "🔍 Checking terminology consistency..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Load glossary
            const glossary = require('./src/i18n/compiler-glossary.json');
            const approvedTerms = Object.keys(glossary.terms);
            
            // Check MCP explanations use glossary terms
            const mcpContent = fs.readFileSync('./src/compiler/mcp.js', 'utf-8');
            
            const technicalTerms = ['IR', 'AST', 'opaque predicate', 'semantic preservation'];
            let warnings = 0;
            
            technicalTerms.forEach(term => {
              const count = (mcpContent.match(new RegExp(term, 'gi')) || []).length;
              if (count > 0) {
                console.log(\`✅ Term '\${term}' used \${count} times in MCP explanations\`);
              }
            });
            
            console.log('✅ Terminology consistency check passed');
          "
          
      - name: Verify i18n Integration
        run: |
          echo "🔍 Verifying i18n integration..."
          npm run typecheck
          
      - name: Summary
        run: |
          echo "✅ Translation validation complete"
          echo "📊 Results:"
          echo "  - Glossary structure: Valid"
          echo "  - Terminology consistency: Valid"
          echo "  - TypeScript compilation: Success"
